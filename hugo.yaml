baseURL: "https://fan4love.netlify.app"
title: "笔随心走"
languageCode: "zh-cn"
theme: "stack"

# 分页
paginate: 10

# 主题参数
params:
  author: "JackLyu"
  description: "微型博客"

  # 深色模式切换
  theme:
    toggle: true
    default: "auto"

  # 侧边栏
  sidebar:
    enabled: true
    subtitle: "记录技术，分享生活"
    avatar: "/images/avatar.jpg"

  # 社交链接
  social:
    - name: "GitHub"
      url: "https://github.com/luckyme258"
      icon: "fab fa-github"
    - name: "WordPress"
      url: "https://fan4love.wordpress.com"
      icon: "fab fa-wordpress"

  # 搜索
  search:
    enabled: true

# 导航菜单
menu:
  main:
    - identifier: "home"
      name: "首页"
      url: "/"
      weight: 10
    - identifier: "posts"
      name: "文章"
      url: "/posts/"
      weight: 20
    - identifier: "categories"
      name: "分类"
      url: "/categories/"
      weight: 30
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 35
    - identifier: "search"
      name: "搜索"
      url: "/search/"
      weight: 40

# 分类设置
taxonomies:
  category: "categories"
  tag: "tags"

# 忽略警告
ignoreLogs:
  - warning-goldmark-raw-html