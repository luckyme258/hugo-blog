baseURL: "https://fan4love.netlify.app"
title: "笔随心走"
languageCode: "zh-cn"


# 分页
paginate: 10

# 主题参数
params:
  author: "Jack Lyu"
  description: "微型博客"
  
  # 关键：隐藏主题自带的侧边栏
  sidebar:
    enabled: false
    
  # 关键：禁用左侧面板
  mainSections: []
  
  # 深色模式切换
  theme:
    toggle: true
    default: "auto"

  # 搜索
  search:
    enabled: true

# 导航菜单
menu:
  main:
    - identifier: "home"
      name: "首页"
      url: "/"
      weight: 10
    - identifier: "posts"
      name: "文章"
      url: "/posts/"
      weight: 20
    - identifier: "categories"
      name: "分类"
      url: "/categories/"
      weight: 30
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 35

# 分类设置
taxonomies:
  category: "categories"
  tag: "tags"

# 忽略警告
ignoreLogs:
  - warning-goldmark-raw-html