<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #1a202c;
            background: #fafbfc;
        }
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 0;
            margin-bottom: 32px;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .site-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #5e72e4;
            text-decoration: none;
        }
        .nav a {
            margin-left: 24px;
            text-decoration: none;
            color: #4a5568;
            transition: color 0.2s;
        }
        .nav a:hover {
            color: #5e72e4;
        }
        .footer {
            text-align: center;
            padding: 32px;
            margin-top: 64px;
            border-top: 1px solid #e2e8f0;
            color: #718096;
            font-size: 0.875rem;
        }
        .footer a {
            color: #5e72e4;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                gap: 12px;
            }
            .nav a {
                margin: 0 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="site-title">{{ .Site.Title }}</a>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/posts/">文章</a>
                <a href="/categories/">分类</a>
                <a href="/tags/">标签</a>
            </nav>
        </div>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="footer">
        <p>© {{ now.Year }} {{ .Site.Params.author }} | 由 <a href="https://gohugo.io/" target="_blank">Hugo</a> 驱动</p>
    </footer>
</body>
</html>
